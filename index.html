<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- عنوان الصفحة -->
  <title>Ahmed Refat | Data Engineer Portfolio</title>

  <!-- استدعاء الخط -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       متغيرات الألوان الأساسية للموقع
    ========================================================= */
    :root {
      --bg: #05070b;
      --bg-2: #090d14;
      --bg-3: #0d1320;
      --panel: rgba(12, 18, 30, 0.88);
      --panel-2: rgba(15, 23, 38, 0.96);
      --line: rgba(68, 211, 255, 0.18);
      --line-soft: rgba(255, 255, 255, 0.08);
      --text: #f4f7fb;
      --muted: #96a4bb;
      --accent: #43d3ff;
      --accent-2: #7cf5d8;
      --success: #61f2b1;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --container: 1220px;
      --nav-height: 82px;
    }

    /* =========================================================
       ألوان الـ Light Mode
    ========================================================= */
    body.light-mode {
      --bg: #f4f8fc;
      --bg-2: #eaf2fb;
      --bg-3: #dde9f7;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-2: rgba(255, 255, 255, 0.98);
      --line: rgba(50, 157, 255, 0.14);
      --line-soft: rgba(10, 23, 45, 0.10);
      --text: #091221;
      --muted: #5e708b;
      --accent: #1499ff;
      --accent-2: #0fb9b1;
      --success: #0fb46c;
      --shadow: 0 22px 60px rgba(18, 42, 82, 0.08);
    }

    /* Reset بسيط */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    /* =========================================================
       ستايل البودي والخلفية العامة
    ========================================================= */
    body {
      font-family: "Outfit", sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(67, 211, 255, 0.14), transparent 20%),
        radial-gradient(circle at 85% 12%, rgba(124, 245, 216, 0.10), transparent 18%),
        radial-gradient(circle at 70% 55%, rgba(167, 139, 250, 0.08), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(67, 211, 255, 0.08), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 46%, var(--bg-3) 100%);
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* شبكة خفيفة فوق الخلفية */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.15));
      z-index: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    ul {
      list-style: none;
    }

    button {
      font: inherit;
      border: none;
      background: none;
      cursor: pointer;
    }

    /* الكونتينر العام */
    .container {
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* كل Section */
    .section {
      padding: 110px 0;
      position: relative;
    }

    /* عنوان صغير فوق كل سيكشن */
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 12px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .section-label::before {
      content: "";
      width: 30px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent));
    }

    /* عنوان السيكشن الرئيسي */
    .section-title {
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: -0.05em;
      margin-bottom: 22px;
      max-width: 900px;
    }

    .about-text {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.95;
      max-width: 780px;
    }

    /* Glass effect */
    .glass {
      background: var(--panel);
      border: 1px solid var(--line-soft);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* =========================================================
       الهيدر والناف بار
    ========================================================= */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: var(--nav-height);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
    }

    .nav {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      position: relative;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
      font-size: 22px;
      color: var(--text);
      text-transform: none;
    }

    .brand span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .nav-links a {
      transition: 0.25s ease;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-links a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -12px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* حالة Open to Work */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(67, 211, 255, 0.07);
      font-size: 13px;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: fit-content;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(97, 242, 177, 0.6);
      animation: pulse 1.6s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(97, 242, 177, 0.55); }
      70% { box-shadow: 0 0 0 10px rgba(97, 242, 177, 0); }
      100% { box-shadow: 0 0 0 0 rgba(97, 242, 177, 0); }
    }

    /* أزرار تغيير الثيم */
    .theme-toggle-wrap,
    .theme-toggle-wrap-mobile {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .theme-toggle,
    .theme-toggle-mobile {
      width: 58px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      position: relative;
      transition: 0.3s ease;
      flex-shrink: 0;
    }

    .theme-toggle::after,
    .theme-toggle-mobile::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transition: 0.3s ease;
    }

    body.light-mode .theme-toggle::after,
    body.light-mode .theme-toggle-mobile::after {
      transform: translateX(27px);
    }

    .menu-btn {
      display: none;
      color: var(--text);
      font-size: 28px;
      line-height: 1;
    }

    .mobile-extras {
      display: none;
    }

    /* =========================================================
       Hero Section
    ========================================================= */
    .hero {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      padding: 120px 0 90px;
      position: relative;
      overflow: hidden;
    }

    .hero-shell {
      max-width: 950px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-card {
      padding: 42px 28px 34px;
      border-radius: 32px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(67, 211, 255, 0.12), transparent 34%),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.10), transparent 38%),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 50%);
      pointer-events: none;
    }

    .hero-photo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
      position: relative;
      z-index: 2;
    }

    .hero-photo {
      width: min(190px, 50vw);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      padding: 8px;
      border: 2px solid rgba(67, 211, 255, 0.28);
      background:
        radial-gradient(circle at 30% 30%, rgba(124, 245, 216, 0.22), transparent 45%),
        linear-gradient(135deg, rgba(67, 211, 255, 0.12), rgba(124, 245, 216, 0.06));
      box-shadow:
        0 0 0 12px rgba(67, 211, 255, 0.05),
        0 0 50px rgba(67, 211, 255, 0.16);
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
    }

    .hero-copy {
      position: relative;
      z-index: 2;
    }

    .hero-copy small {
      display: inline-block;
      margin-bottom: 18px;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .hero-name {
      font-size: clamp(60px, 11vw, 128px);
      line-height: 0.88;
      letter-spacing: -0.07em;
      margin-bottom: 16px;
      font-weight: 800;
      background: linear-gradient(110deg, var(--accent) 0%, #a78bfa 50%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-name span {
      display: block;
    }

    .hero-role {
      font-size: clamp(22px, 4vw, 34px);
      min-height: 44px;
      margin-bottom: 22px;
      font-weight: 500;
    }

    .typed-text {
      background: linear-gradient(110deg, var(--accent) 0%, #a78bfa 50%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-text {
      color: var(--muted);
      line-height: 2;
      max-width: 700px;
      font-size: 18px;
      margin: 0 auto 32px;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* أزرار عامة */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 13px;
      font-weight: 700;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-primary {
      color: #041017;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 26px rgba(67, 211, 255, 0.16);
      border-color: transparent;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(67, 211, 255, 0.22);
    }

    .btn-outline {
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }

    .btn-outline:hover {
      background: rgba(67, 211, 255, 0.08);
      transform: translateY(-3px);
      border-color: rgba(67, 211, 255, 0.26);
    }

    /* =========================================================
       About + Stats
    ========================================================= */
    .about-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: start;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-box {
      background: var(--panel);
      border: 1px solid var(--line-soft);
      border-radius: 22px;
      min-height: 118px;
      padding: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .stat-number {
      font-size: 54px;
      line-height: 0.9;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stat-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    /* =========================================================
       Skills
    ========================================================= */
    .skill-blocks {
      display: grid;
      gap: 20px;
      margin-top: 30px;
    }

    .skill-row {
      padding: 24px;
      border: 1px solid var(--line-soft);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .skill-row-title {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .skill-row-icon {
      font-size: 18px;
      line-height: 1;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tag {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 999px;
    }

    /* ألوان مختلفة لكل category */
    .skill-row:nth-child(1) .skill-tag {
      border-color: rgba(67, 211, 255, 0.28);
      background: rgba(67, 211, 255, 0.07);
      color: var(--accent);
    }

    .skill-row:nth-child(2) .skill-tag {
      border-color: rgba(167, 139, 250, 0.28);
      background: rgba(167, 139, 250, 0.07);
      color: #c4b5fd;
    }

    .skill-row:nth-child(3) .skill-tag {
      border-color: rgba(124, 245, 216, 0.28);
      background: rgba(124, 245, 216, 0.07);
      color: var(--accent-2);
    }

    .skill-row:nth-child(4) .skill-tag {
      border-color: rgba(251, 191, 36, 0.28);
      background: rgba(251, 191, 36, 0.07);
      color: #fbbf24;
    }

    .skill-row:nth-child(5) .skill-tag {
      border-color: rgba(251, 113, 133, 0.28);
      background: rgba(251, 113, 133, 0.07);
      color: #fb7185;
    }

    /* =========================================================
       Education
    ========================================================= */
    .education-card {
      background: var(--panel);
      border: 1px solid var(--line-soft);
      padding: 36px;
      box-shadow: var(--shadow);
      margin-top: 30px;
      position: relative;
      overflow: hidden;
      border-radius: 28px;
    }

    .education-card::before {
      content: "";
      position: absolute;
      inset: auto auto 0 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .education-degree {
      font-size: 30px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .education-university,
    .education-date {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.9;
    }

    .education-date strong {
      color: var(--text);
      font-weight: 600;
    }

    /* =========================================================
       Projects
    ========================================================= */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      margin-top: 34px;
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
    }

    .project-card {
      background: var(--panel);
      border: 1px solid var(--line-soft);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, border-color 0.25s ease;
      border-radius: 0;
      backdrop-filter: blur(16px);
      min-height: 100%;
    }

    .project-card:hover {
      transform: translateY(-8px);
      border-color: rgba(67, 211, 255, 0.24);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.35),
        0 0 40px rgba(67, 211, 255, 0.10),
        0 0 80px rgba(167, 139, 250, 0.07);
    }

    .project-slider {
      position: relative;
      aspect-ratio: 16 / 9.4;
      overflow: hidden;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(135deg, rgba(67, 211, 255, 0.10), rgba(124, 245, 216, 0.06));
    }

    .project-slides {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
    }

    .project-slide {
      min-width: 100%;
      height: 100%;
    }

    .project-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(6, 10, 18, 0.62);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      font-size: 18px;
      backdrop-filter: blur(8px);
    }

    .slider-btn:hover {
      background: rgba(67, 211, 255, 0.18);
    }

    .slider-btn.prev {
      left: 12px;
    }

    .slider-btn.next {
      right: 12px;
    }

    .slider-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .slider-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.18);
      cursor: pointer;
    }

    .slider-dot.active {
      background: var(--accent);
    }

    .project-body {
      padding: 28px;
    }

    .project-index {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .project-title {
      font-size: 31px;
      line-height: 1.12;
      margin-bottom: 10px;
    }

    .project-subtitle {
      color: var(--accent-2);
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    .project-text {
      color: var(--muted);
      line-height: 1.95;
      font-size: 17px;
      margin-bottom: 20px;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .project-tags span {
      font-size: 12px;
      padding: 8px 11px;
      border: 1px solid rgba(67, 211, 255, 0.18);
      color: var(--accent);
      background: rgba(67, 211, 255, 0.06);
      border-radius: 999px;
    }

    .project-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .project-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid rgba(
